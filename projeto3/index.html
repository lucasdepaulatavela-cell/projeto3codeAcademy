<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <link rel="icon" href="image/pokeball.png">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Catálogo de Pokémons</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
            <h2> Pokedex </h2>
        </header>

        <div class="catalogo">
            
            <div class="card">
                <img src="image/water.jpg" alt="tipo agua">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/agua/">Água</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/fire.jpg" alt="tipo fogo">
               <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/fogo/">Fogo</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/grass.jpg" alt="tipo planta">
               <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/erva/">Planta</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/luta.jpeg" alt="tipo luta">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/lutador/">Luta</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/ghost.jpg" alt="tipo fantasma">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/fantasma/">Fantasma</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/dragon.webp" alt="tipo dragao">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/dragao/">Dragão</a>
                </h2>
            </div>

            <div class="card">
                <img src="image/eletric.jpg" alt="tipo eletrico">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/eletrico/">Elétrico</a>
                </h2> 
            </div>

            <div class="card">
                <img src="image/fairy.png" alt="tipo fada">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/fada/">Fada</a>
                </h2> 
            </div>

            <div class="card">
                <img src="image/psychic.png" alt="tipo psiquico">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/psiquico/">Psíquico</a>
                </h2> 
            </div>

            <div class="card">
                <img src="image/earth.png" alt="tipo terra">
                <h2>
                <a href="https://pokeportuga.pt/mecanicas/tipos/terra/">Terra</a>
                </h2> 
            </div>

        </div>

        <section class="destaques">
            <h2>Pokemon em Destaque</h2>
            <div class="carrossel">

                <div class="card-pokemon">
                        <img src="image/kroko.png" alt="krokorok">
                        <h3>Krokorok</h3>
                    </div>

                <div class="card-pokemon">
                        <img src="image/froakie.png" alt="froakie">
                        <h3>Froakie</h3>
                    </div>

                <div class="card-pokemon">
                        <img src="image/dragonite.png" alt="dragonite">
                        <h3>Dragonite</h3>
                    </div>

                <div class="card-pokemon">
                        <img src="image/gengar.jpeg" alt="gengar"> 
                        <h3>Gengar</h3>
                    </div>

                <div class="card-pokemon">
                        <img src="image/pansear.jpeg" alt="pansear">
                        <h3>Pansear</h3>
                    </div>

            </div>
        </section>

            <footer>
                <h2>
                    Catálogo de Tipo Pokemon
                </h2>
            </footer>
    </body>
</html>
